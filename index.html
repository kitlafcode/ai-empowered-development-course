<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>My App</h1>
    </header>

    <main>
        <div class="container">
            <h1>My Todos</h1>
            <div class="input-section">
                <div class="input-fields">
                    <input type="text" id="todoInput" placeholder="Add a new todo...">
                    <input type="date" id="dueDateInput">
                    <input type="text" id="categoryInput" list="categoriesList" placeholder="Category (optional)">
                    <datalist id="categoriesList"></datalist>
                    <select id="priorityInput">
                        <option value="">No priority</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>
                <button id="addBtn">Add</button>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
                <button class="filter-btn sort-btn" id="sortDueDateBtn">Sort by due date</button>
                <button class="filter-btn sort-btn" id="sortCompletedBtn">Sort by completion date</button>
                <button class="filter-btn sort-btn active" id="sortPriorityBtn">Sort by priority</button>
                <button class="filter-btn" id="filterFavoritesBtn" aria-pressed="false">Favorites</button>
                <select id="categoryFilter" class="category-filter-select">
                    <option value="all">All categories</option>
                    <option value="uncategorized">Uncategorized</option>
                </select>
            </div>

            <ul class="todo-list" id="todoList"></ul>
        </div>
    </main>

    <footer>
        <p>&copy; 2026</p>
    </footer>

    <script type="module" src="/main.js"></script>
</body>
</html>
